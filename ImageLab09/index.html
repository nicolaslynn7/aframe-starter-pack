<!DOCTYPE html>
<html>
<head>

<body>

    <a-cylinder position="-0.75 3 -5" rotation="0 0 90" radius="0.07" height="1.2" color="#8B4513"></a-cylinder>

    <a-cylinder position="0 4.4 -4.27" rotation="-90 0 0" radius="0.1" height="1.5" color="#FFA500"></a-cylinder>

    <a-sphere position="-0.22 4.55 -4.35" radius="0.07" color="#222222"></a-sphere>

    <a-sphere position="-0.12 4.18 -4.38" radius="0.05" color="#222222"></a-sphere>

    <a-sphere position="0.12 4.18 -4.38" radius="0.05" color="#222222"></a-sphere>

    <a-sphere position="-0.15 2.95 -4.05" radius="0.09" color="#222222"></a-sphere>

    <a-sphere position="0.15 2.95 -4.05" radius="0.09" color="#222222"></a-sphere>

    <a-cylinder position="0 4.95 -5" radius="0.78" height="0.18" color="#222222"></a-cylinder>
    <a-cylinder position="0 5.08 -5" radius="0.55" height="0.65" color="#222222"></a-cylinder>

    <a-torus position="0 4.4 -5" rotation="90 0 0" radius="0.55" radius-tubular="0.045" color="#cc0000"></a-torus>

    <a-entity environment="preset: dream ; dressingAmount: 1000"></a-entity>
  </a-scene>
</body>
</html>
