<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Icons of Greens: Golf Museum</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-assets>
        <img id="sky-texture" src="31637656148_fc66ce03cd_5k.jpg">
        <a-asset-item id="azalea-model" src="assets/rhododendron_-_azalea__free_download/"></a-asset-item>
      </a-assets>

      <a-sky src="#sky-texture"></a-sky>

      <a-plane position="0 0.01 0" rotation="-90 0 0" width="100" height="100" color="#2d5a27"></a-plane>

      <a-entity position="-4 0 -6">
        <a-entity gltf="#azalea-model" position="0 1 0" scale="1 1 1"></a-entity>
        
        
        
        <a-text value="AMEN CORNER\nAugusta Azalea" position="0 1.2 0.7" align="center" width="3" color="#FFF"></a-text>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor color="#FF0000"></a-cursor>
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="-1 4 2" intensity="0.6"></a-light>

    </a-scene>
  </body>
</html>
